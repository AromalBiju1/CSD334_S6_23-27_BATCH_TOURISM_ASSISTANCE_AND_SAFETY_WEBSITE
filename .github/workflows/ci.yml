name: GuardMyTrip CI

on:
  push:
    branches: [main, Aromal]
  pull_request:
    branches: [main]

jobs:
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build check
        run: npm run build

  backend-check:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt"
          pip install fastapi sqlalchemy uvicorn python-jose[cryptography] passlib[bcrypt] python-multipart email-validator python-dotenv

      - name: Syntax check
        run: |
          python -m py_compile main.py
          python -m py_compile database/models.py
          python -m py_compile database/schemas.py
          python -m py_compile routers/auth/routes.py
          python -m py_compile routers/profile/routes.py
          python -m py_compile routers/recommendations/routes.py
